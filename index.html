<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2f; color: white; text-align: center; padding: 20px; }
        h1 { margin-bottom: 5px; color: #4facfe; }
        p { color: #a0a0b0; margin-bottom: 20px; }
        
        /* The New Counter Style */
        .counter-box { background-color: #2a2a40; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 30px; border: 2px solid #4facfe; }
        .counter-number { font-size: 3rem; font-weight: bold; color: #2ecc71; }
        
        .parking-lot { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; max-width: 900px; margin: 0 auto; padding: 30px; background-color: #2a2a40; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slot { width: 130px; height: 200px; border: 3px dashed #555; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; transition: all 0.3s ease; }
        
        .empty { background-color: #2ecc71; color: #004d00; border-color: #2ecc71; box-shadow: 0 0 15px #2ecc7155; }
        .occupied { background-color: #e74c3c; color: #4d0000; border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c55; }
        .slot-name { font-size: 1.5rem; margin-bottom: 10px; }
        .sensor-type { font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>IIIT Smart Parking Dashboard</h1>
    <p>Live Infrastructure Monitoring System</p>

    <div class="counter-box">
        <div>AVAILABLE SPOTS</div>
        <div id="spot-counter" class="counter-number">5</div>
    </div>

    <div class="parking-lot">
        <div id="Slot_1" class="slot empty"><div class="slot-name">Slot 1</div><div class="sensor-type">(IR)</div><div class="status-text">Empty</div></div>
        <div id="Slot_2" class="slot empty"><div class="slot-name">Slot 2</div><div class="sensor-type">(IR)</div><div class="status-text">Empty</div></div>
        <div id="Slot_3" class="slot empty"><div class="slot-name">Slot 3</div><div class="sensor-type">(IR)</div><div class="status-text">Empty</div></div>
        <div id="Slot_4" class="slot empty"><div class="slot-name">Slot 4</div><div class="sensor-type">(Ultra)</div><div class="status-text">Empty</div></div>
        <div id="Slot_5" class="slot empty"><div class="slot-name">Slot 5</div><div class="sensor-type">(Ultra)</div><div class="status-text">Empty</div></div>
    </div>

    <script>
        // PASTE YOUR KEYS HERE AGAIN
        const firebaseConfig = {
            apiKey: "AIzaSyCg9cUTKnjfENsodAE_m9cZpO-ShazfG3Q",
            databaseURL: "https://smartparking-7501c-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const lotRef = database.ref('/ParkingLot');

        lotRef.on('value', (snapshot) => {
            const data = snapshot.val();
            let availableCount = 0; // Reset counter every time data updates
            
            if (data) {
                for (const slotID in data) {
                    const status = data[slotID];
                    const slotElement = document.getElementById(slotID);
                    
                    if (status === "Empty") {
                        availableCount++; // Add to counter if empty
                    }
                    
                    if (slotElement) {
                        slotElement.querySelector('.status-text').innerText = status;
                        if (status === "Occupied") {
                            slotElement.className = "slot occupied";
                        } else {
                            slotElement.className = "slot empty";
                        }
                    }
                }
            }
            // Update the giant counter number on the screen
            document.getElementById('spot-counter').innerText = availableCount;
            
            // Turn counter red if lot is full!
            if (availableCount === 0) {
                document.getElementById('spot-counter').style.color = "#e74c3c";
            } else {
                document.getElementById('spot-counter').style.color = "#2ecc71";
            }
        });
    </script>
</body>
</html>
